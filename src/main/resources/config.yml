# Interval in ticks between water checks (20 ticks = 1 second)
check-interval: 10

# Decay speed multiplier for water exposure time
# 1.0 = same speed as accumulation, 2.0 = twice as fast
decay-multiplier: 1.0

# World filters (empty = all worlds)
enabled-worlds: []
disabled-worlds: []

# Whether to respect certain player states
respect-gamemode: true
respect-vehicle: true

# Whether water breathing potion effect slows down accumulation
respect-water-breathing: false

# Enable detailed console logging
verbose-log: false

# Punishment stages, triggered when total water exposure reaches the specified seconds
# Each stage executes all effects simultaneously when reached
stages:
  1:
    trigger-seconds: 3
    effects:
      - type: POTION
        effect: NAUSEA
        duration: 100
        amplifier: 0
      - type: POTION
        effect: BLINDNESS
        duration: 60
        amplifier: 0
  2:
    trigger-seconds: 7
    effects:
      - type: POTION
        effect: POISON
        duration: 60
        amplifier: 0
      - type: MESSAGE
        message: "&c水正在侵蚀你的身体..."
  3:
    trigger-seconds: 12
    effects:
      - type: POTION
        effect: WITHER
        duration: 60
        amplifier: 0
      - type: SUMMON
        entity: DROWNED
        amount: 2
        radius: 3
  4:
    trigger-seconds: 20
    effects:
      - type: DAMAGE
        amount: 8.0
      - type: LIGHTNING
        chance: 0.3
      - type: COMMAND
        command: "kill {player}"
